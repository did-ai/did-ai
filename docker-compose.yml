version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: did-ai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-didai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-didai_secret}
      POSTGRES_DB: ${POSTGRES_DB:-didai}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-didai} -d ${POSTGRES_DB:-didai}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - did-ai-network

  redis:
    image: redis:7-alpine
    container_name: did-ai-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --save 900 1 --save 300 10
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - did-ai-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: did-ai-api
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-3000}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-didai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-didai_secret}
      POSTGRES_DB: ${POSTGRES_DB:-didai}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-q",
          "--spider",
          "http://localhost:${PORT:-3000}/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - did-ai-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  did-ai-network:
    driver: bridge
